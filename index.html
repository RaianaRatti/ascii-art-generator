<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            var saved = localStorage.getItem("ascii-art-theme");
            if (saved) document.documentElement.setAttribute("data-theme", saved);
        })();
    </script>
</head>
<body>

    <div class="crt-overlay"></div>

    <button type="button" id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Open theme settings" aria-expanded="false" title="Theme settings">&#9881;</button>

    <aside class="theme-panel" id="theme-panel" hidden>
        <div class="theme-panel-header">
            <span>THEME</span>
            <button type="button" id="theme-panel-close" class="theme-panel-close" aria-label="Close theme settings">&times;</button>
        </div>

        <div class="theme-group">
            <p class="theme-group-label">Dark</p>
            <div class="theme-swatches" data-group="dark"></div>
        </div>

        <div class="theme-group">
            <p class="theme-group-label">Light</p>
            <div class="theme-swatches" data-group="light"></div>
        </div>

        <div class="theme-group">
            <p class="theme-group-label">Output Box</p>
            <div class="output-mode-toggle" id="output-mode-toggle">
                <button type="button" class="output-mode-btn" data-output-mode="dark">Dark</button>
                <button type="button" class="output-mode-btn" data-output-mode="light">Light</button>
            </div>
        </div>
    </aside>

    <main class="terminal">

        <header class="term-header">
            <span class="term-dot"></span>
            <span class="term-dot"></span>
            <span class="term-dot"></span>
            <h1>ASCII_ART_GENERATOR<span class="cursor">_</span></h1>
        </header>

        <section class="panel controls">

            <div class="field">
                <label for="file-input">01 // SOURCE IMAGE</label>
                <div class="dropzone" id="dropzone">
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <p id="dropzone-text">Drop an image here, or click to browse</p>
                    <img id="preview-thumb" class="preview-thumb" hidden alt="Selected image preview">
                </div>
            </div>

            <div class="field">
                <label for="char-ramp">02 // CHARACTER RAMP (darkest &rarr; lightest)</label>
                <input type="text" id="char-ramp" value="@%#*+=-:. " maxlength="24" spellcheck="false">
                <div class="presets">
                    <button type="button" class="preset-btn" data-ramp="@%#*+=-:. ">standard</button>
                    <button type="button" class="preset-btn" data-ramp="$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\|()1{}[]?-_+~i!lI;:,\"^`'. ">detailed</button>
                    <button type="button" class="preset-btn" data-ramp="█▓▒░ ">blocks</button>
                    <button type="button" class="preset-btn" data-ramp="#. ">minimal</button>
                </div>
            </div>

            <div class="field field-row">
                <div class="sub-field">
                    <label for="width-range">03 // OUTPUT WIDTH <span id="width-value">120</span> cols</label>
                    <input type="range" id="width-range" min="40" max="300" value="120">
                </div>
                <div class="sub-field checkbox-field">
                    <label for="color-toggle">04 // COLOR MODE</label>
                    <input type="checkbox" id="color-toggle">
                </div>
            </div>

            <button type="button" id="generate-btn" class="primary-btn" disabled>RUN &gt;_</button>

        </section>

        <section class="panel output" id="output-panel" hidden>
            <div class="output-header">
                <span>OUTPUT</span>
                <div class="output-actions">
                    <button type="button" id="download-png-btn" class="ghost-btn">Download PNG</button>
                    <button type="button" id="download-txt-btn" class="ghost-btn">Download TXT</button>
                </div>
            </div>
            <div class="ascii-scroll">
                <pre id="ascii-output"></pre>
            </div>
        </section>

    </main>

    <canvas id="render-canvas" hidden></canvas>
    <canvas id="source-canvas" hidden></canvas>

    <script src="script.js"></script>
</body>
</html>
